name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make lint
      - run: make test
      - run: make clean package VERSION="${VERSION}"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lhm-companion_${{ github.ref_name }}_linux_amd64.tar.gz
            dist/lhm-companion_${{ github.ref_name }}_linux_amd64.tar.gz.sha256
            dist/lhm-companion_linux_amd64.tar.gz
            dist/lhm-companion_linux_amd64.tar.gz.sha256
            install.sh
            uninstall.sh
